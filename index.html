<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MyShop</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="./styles/style-index.css" />
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary py-3">
    <div class="container-fluid">
      <a class="navbar-brand fs-3" href="index.html">MyShop</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a href="cart.html" class="position-relative cart-icon">
              <i class="bi bi-cart"></i>
              <span id="cart-badge">1</span>
            </a>

          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Hero Banner -->
  <section class="hero-banner py-5">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-md-6 text-center text-md-start">
          <h1 class="display-4 fw-bold">Discover Our New Collection</h1>
          <p class="lead mb-4">Welcome to MyShop!</p>
          <a href="#products" class="btn btn-primary btn-lg">Shop Now</a>
        </div>
        <div class="col-md-6">
          <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30" alt="New Collection"
            class="img-fluid rounded" />
        </div>
      </div>
    </div>
  </section>

  <!-- Products -->
  <div class="container-fluid mt-4" id="products">
    <div class="row">
      <!-- Sidebar Filters -->
      <aside class="col-12 col-md-3 mb-4" id="sidebarFilters" style="padding-top:20px;">
        <div class="mb-4">
          <h5 class="mb-3">Price</h5>
          <button id="priceLowHigh" class="btn btn-outline-primary w-100 mb-2">Low → High</button>
          <button id="priceHighLow" class="btn btn-outline-primary w-100 mb-3">High → Low</button>
        </div>
        <div class="mb-4">
          <h5 class="mb-3">Categories</h5>
          <div id="categoryFilters"></div>
        </div>
      </aside>

      <!-- Product Results -->
      <main class="col-12 col-md-9 p-4">
        <div class="d-flex justify-content-end mb-3">
          <button id="gridViewBtn" class="btn btn-outline-primary me-2 active">Grid View</button>
          <button id="listViewBtn" class="btn btn-outline-secondary">List View</button>
        </div>

        <div id="spinner" class="d-flex justify-content-center d-none mb-3">
          <div class="spinner-border" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
        </div>

        <div id="resultContainer" class="grid-view">
          <div class="row"></div>
        </div>

        <!-- Responsive Pagination -->
        <nav aria-label="Page navigation" class="mt-4">
          <ul class="pagination pagination-sm flex-wrap justify-content-center"></ul>
        </nav>
      </main>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-secondary text-light mt-5">
    <div class="container py-4">
      <div class="row">
        <div class="col-12 col-md-6 mb-3">
          <h5>MyShop</h5>
          <p>Your favorite online shopping store.</p>
        </div>
        <div class="col-12 col-md-6 mb-3">
          <h5>Navigation</h5>
          <ul class="list-unstyled">
            <li><a href="index.html" class="text-light text-decoration-none">Home</a></li>
            <li><a href="cart.html" class="text-light text-decoration-none">Cart</a></li>
          </ul>
        </div>
      </div>
      <div class="text-center mt-3">
        <small>&copy; 2026 MyShop. All rights reserved.</small>
      </div>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./scripts/app.js"></script>
</body>

</html>
