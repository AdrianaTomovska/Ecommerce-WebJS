<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cart</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="./styles/style-cart.css" />
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand fs-3" href="index.html">MyShop</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a href="cart.html" class="position-relative cart-icon">
              <i class="bi bi-cart"></i>
              <span id="cart-badge">0</span> 
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main Cart Layout -->
  <main class="cart-wrapper">
    <div class="container py-5">
      <h3 class="mb-4 text-left">Your Cart</h3>
      <div class="row">
        <!-- Products -->
        <div class="col-12 col-lg-8 mb-3">
          <div id="cartContainer" class="table-responsive"></div>
        </div>

        <!-- Summary -->
        <div class="col-12 col-lg-4">
          <div class="card shadow-sm">
            <div class="card-header">
              <h5 class="mb-0">Summary</h5>
            </div>
            <div class="card-body">
              <p class="d-flex justify-content-between">
                <span>Shipping:</span>
                <span id="cartShipping">$0.00</span>
              </p>
              <p class="d-flex justify-content-between">
                <span>Quantity:</span>
                <span id="cartQuantity">0</span>
              </p>
              <p class="d-flex justify-content-between fw-bold">
                <span>Total:</span>
                <span id="cartTotal">$0.00</span>
              </p>
              <button id="checkoutBtn" class="btn btn-primary w-100 mt-3">Proceed to Checkout</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Checkout Modal -->
  <div class="modal fade" id="checkoutModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Proceed to Checkout</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          Do you want to clear the cart?
        </div>
        <div class="modal-footer">
          <button id="checkoutNo" type="button" class="btn btn-secondary" data-bs-dismiss="modal">No</button>
          <button id="checkoutYes" type="button" class="btn btn-primary">Yes</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
    <div id="checkoutToast" class="toast align-items-center text-bg-success border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body">
          Cart has been successfully cleared!
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-secondary text-light">
    <div class="container py-4">
      <div class="row">
        <div class="col-12 col-md-6 mb-3">
          <h5>MyShop</h5>
          <p>Your favorite online shopping store.</p>
        </div>
        <div class="col-12 col-md-6 mb-3">
          <h5>Navigation</h5>
          <ul class="list-unstyled">
            <li><a href="index.html" class="text-light text-decoration-none">Home</a></li>
            <li><a href="cart.html" class="text-light text-decoration-none">Cart</a></li>
          </ul>
        </div>
      </div>
      <div class="text-center mt-3">
        <small>&copy; 2026 MyShop. All rights reserved.</small>
      </div>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Cart JS -->
  <script type="module" src="./scripts/cartpage.js"></script>
</body>
</html>
